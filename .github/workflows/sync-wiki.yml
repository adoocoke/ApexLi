name: Sync Wiki

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Sync Wiki
        run: |
          chmod +x scripts/sync-wiki.sh
          ./scripts/sync-wiki.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}