name: Sync Wiki

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync docs/wiki to GitHub Wiki
        run: |
          chmod +x scripts/sync-wiki.sh
          ./scripts/sync-wiki.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}