name: Tests

on:
  push:
    branches:
      - main
      - 'refactor/**'
      - 'feature/**'
  pull_request:
    branches: [ main ]

# ====================== 权限配置 ======================
permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false

      # ====================== Checkout Private Playbook Repo ======================
      - name: Checkout Private Playbook Repository
        uses: actions/checkout@v4
        with:
          repository: adoocoke/trading-playbooks
          token: ${{ secrets.PLAYBOOK_REPO_TOKEN }}     # 必须是具有 repo 权限的 PAT
          path: artifacts/playbooks
          sparse-checkout: |
            trading_playbook_v3.md
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          persist-credentials: false

      # ====================== Python 环境设置 ======================
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tushare,langgraph]"

      # ====================== 运行测试 ======================
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      # 可选：输出 playbook 是否成功检出（调试用）
      - name: Verify Playbook Checkout
        run: |
          echo "=== Playbook Checkout Status ==="
          ls -la artifacts/playbooks/
          if [ -f "artifacts/playbooks/trading_playbook_v3.md" ]; then
            echo "✅ trading_playbook_v3.md 检出成功"
            echo "文件大小: $(wc -c < artifacts/playbooks/trading_playbook_v3.md) bytes"
          else
            echo "❌ trading_playbook_v3.md 检出失败"
            exit 1
          fi