name: Tests

on:
  push:
    branches:
      - main
      - 'refactor/**'      # ← 新增：支持重构分支
      - 'feature/**'       # ← 新增：支持功能分支（可选）
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ====================== Checkout Private Playbook Repo ======================
      - name: Checkout Private Playbook Repo
        uses: actions/checkout@v4
        with:
          repository: adoocoke/trading-playbooks
          token: ${{ secrets.PLAYBOOK_REPO_TOKEN }}
          path: artifacts/playbooks
          sparse-checkout: |
            trading_playbook_v3.md
          sparse-checkout-cone-mode: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tushare,langgraph]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
