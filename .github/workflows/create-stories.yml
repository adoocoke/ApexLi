name: Create User Stories

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Epics
        run: |
          gh issue create --repo ${{ github.repository }} --title "[Epic] Structured LLM Communication" --body "包含 EA-001 ~ EA-003" --label "Epic: Structured-LLM"
          gh issue create --repo ${{ github.repository }} --title "[Epic] Multi-round Analysis Loop" --body "包含 EA-004 ~ EA-005" --label "Epic: Multi-round-Loop"
          gh issue create --repo ${{ github.repository }} --title "[Epic] Playbook Strategy" --body "包含 EA-006 ~ EA-007" --label "Epic: Playbook-Strategy"
          gh issue create --repo ${{ github.repository }} --title "[Epic] Observability" --body "包含 EA-008 ~ EA-009" --label "Epic: Observability"
          gh issue create --repo ${{ github.repository }} --title "[Epic] Engineering" --body "包含 EA-010" --label "Epic: Engineering"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create High Priority Stories
        run: |
          gh issue create --repo ${{ github.repository }} --title "EA-001: 结构化市场观察输出" --body "As a 交易者, I want 结构化市场观察输出. See docs/user-journey-and-stories.md" --label "Epic: Structured-LLM,Priority: P0,Type: Story"
          gh issue create --repo ${{ github.repository }} --title "EA-002: 结构化交易信号输出" --body "As a 系统, I want 结构化交易信号输出. See docs/user-journey-and-stories.md" --label "Epic: Structured-LLM,Priority: P0,Type: Story"
          gh issue create --repo ${{ github.repository }} --title "EA-004: 智能多轮分析控制" --body "As a 交易者, I want 智能多轮分析控制. See docs/user-journey-and-stories.md" --label "Epic: Multi-round-Loop,Priority: P0,Type: Story"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}