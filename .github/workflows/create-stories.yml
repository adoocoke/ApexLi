name: Create User Stories

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Labels
        run: |
          gh label create "Epic: Structured-LLM" --color "0E8A16" --description "Epic for Structured LLM Communication" || true
          gh label create "Epic: Multi-round-Loop" --color "0E8A16" --description "Epic for Multi-round Analysis" || true
          gh label create "Epic: Playbook-Strategy" --color "0E8A16" --description "Epic for Playbook Strategy" || true
          gh label create "Epic: Observability" --color "0E8A16" --description "Epic for Observability" || true
          gh label create "Epic: Engineering" --color "0E8A16" --description "Epic for Engineering" || true
          gh label create "Priority: P0" --color "D93F0B" --description "Highest priority" || true
          gh label create "Priority: P1" --color "FBCA04" --description "High priority" || true
          gh label create "Priority: P2" --color "0E8A16" --description "Normal priority" || true
          gh label create "Type: Story" --color "5319E7" --description "User Story" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Epics (with duplicate check)
        run: |
          create_epic() {
            local title="$1"
            local body="$2"
            local label="$3"
            if ! gh issue list --repo ${{ github.repository }} --search "in:title \"$title\"" --json number --jq 'length > 0' | grep -q true; then
              gh issue create --repo ${{ github.repository }} --title "$title" --body "$body" --label "$label"
            else
              echo "Issue already exists: $title"
            fi
          }

          create_epic "[Epic] Structured LLM Communication" "包含 EA-001 ~ EA-003" "Epic: Structured-LLM"
          create_epic "[Epic] Multi-round Analysis Loop" "包含 EA-004 ~ EA-005" "Epic: Multi-round-Loop"
          create_epic "[Epic] Playbook Strategy" "包含 EA-006 ~ EA-007" "Epic: Playbook-Strategy"
          create_epic "[Epic] Observability" "包含 EA-008 ~ EA-009" "Epic: Observability"
          create_epic "[Epic] Engineering" "包含 EA-010" "Epic: Engineering"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create High Priority Stories (with duplicate check)
        run: |
          create_story() {
            local title="$1"
            local body="$2"
            local labels="$3"
            if ! gh issue list --repo ${{ github.repository }} --search "in:title \"$title\"" --json number --jq 'length > 0' | grep -q true; then
              gh issue create --repo ${{ github.repository }} --title "$title" --body "$body" --label "$labels"
            else
              echo "Issue already exists: $title"
            fi
          }

          create_story "EA-001: 结构化市场观察输出" "As a 交易者, I want 结构化市场观察输出. See docs/user-journey-and-stories.md" "Epic: Structured-LLM,Priority: P0,Type: Story"
          create_story "EA-002: 结构化交易信号输出" "As a 系统, I want 结构化交易信号输出. See docs/user-journey-and-stories.md" "Epic: Structured-LLM,Priority: P0,Type: Story"
          create_story "EA-004: 智能多轮分析控制" "As a 交易者, I want 智能多轮分析控制. See docs/user-journey-and-stories.md" "Epic: Multi-round-Loop,Priority: P0,Type: Story"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}